{% extends "base.html" %}

{% block title %}Contact Us{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto py-12 px-6">

    <!-- Header -->
    <div class="mb-10 text-center">
        <h1 class="text-4xl font-black text-on-surface">Contact Us</h1>
        <p class="text-on-surface-variant mt-2">
            Have a question or feedback? Send us a message.
        </p>
    </div>

    <!-- Contact Form -->
    <form method="POST"
          action="{{ url_for('main.contact') }}"
          class="bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-8 space-y-6 shadow-sm">

        <!-- Name -->
        <div>
            <label class="block text-sm font-semibold text-on-surface mb-2">
                Your Name
            </label>
            <input type="text"
                   name="name"
                   required
                   class="w-full px-4 py-3 rounded-xl border border-outline-variant/40 focus:ring-2 focus:ring-primary outline-none"
                   placeholder="Enter your name">
        </div>

        <!-- Email -->
        <div>
            <label class="block text-sm font-semibold text-on-surface mb-2">
                Email
            </label>
            <input type="email"
                   name="email"
                   required
                   class="w-full px-4 py-3 rounded-xl border border-outline-variant/40 focus:ring-2 focus:ring-primary outline-none"
                   placeholder="Enter your email">
        </div>

        <div>
            <label class="block text-sm font-semibold text-on-surface mb-2">
                Message
            </label>
            <textarea name="message"
                      rows="6"
                      required
                      class="w-full px-4 py-3 rounded-xl border border-outline-variant/40 focus:ring-2 focus:ring-primary outline-none resize-none"
                      placeholder="Write your message..."></textarea>
        </div>

        <!-- Submit -->
        <button type="submit"
                class="primary-gradient w-full py-3 rounded-xl text-white font-bold hover:scale-[1.02] active:scale-95 transition">
            Send Message
        </button>

    </form>

</div>

{% endblock %}
