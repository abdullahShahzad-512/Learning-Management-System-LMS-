{% extends "base.html" %}
{% block content %}
<h2>{{ assignment.title }} — Submissions</h2>
<ul class="list-group">
  {% for s in submissions %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
      {{ s.student.username }} {% if s.grade %}<span class="badge bg-success">{{ s.grade }}</span>{% else %}<span class="badge bg-secondary">Ungraded</span>{% endif %}
      <a href="{{ url_for('main.grade_submission', submission_id=s.id) }}" class="btn btn-outline-primary btn-sm">Review / Grade</a>
    </li>
  {% else %}
    <li class="list-group-item">No submissions yet.</li>
  {% endfor %}
</ul>
{% endblock %}
