{% extends "base.html" %}
{% block content %}
<h2>{{ quiz.title }}</h2>
<form method="POST">
  {% for question in quiz.questions %}
    <div class="mb-3">
      <p><strong>{{ loop.index }}. {{ question.text }}</strong></p>
      {% for choice in question.choices %}
        <div class="form-check">
          <input class="form-check-input" type="radio" name="question_{{ question.id }}" value="{{ choice.id }}" required>
          <label class="form-check-label">{{ choice.text }}</label>
        </div>
      {% endfor %}
    </div>
  {% endfor %}
  <button type="submit" class="btn btn-warning">Submit Quiz</button>
</form>
{% endblock %}
