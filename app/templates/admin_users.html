{% extends "admin_base.html" %}
{% block admin_content %}
<h2 class="mb-4">Manage Users</h2>

<table class="table admin-table">
  <thead><tr><th>Username</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
  <tbody>
    {% for user in users %}
      <tr>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>
          {% if user.is_admin() %}
            <span class="badge badge-admin">Admin</span>
          {% else %}
            <span class="badge bg-secondary">User</span>
          {% endif %}
        </td>
        <td>
          <form method="POST" action="{{ url_for('main.toggle_admin', user_id=user.id) }}" class="d-inline">
            <button class="btn btn-sm btn-outline-primary">
              {% if user.is_admin() %}Revoke Admin{% else %}Make Admin{% endif %}
            </button>
          </form>
          <form method="POST" action="{{ url_for('main.delete_user', user_id=user.id) }}" class="d-inline" onsubmit="return confirm('Delete this user?');">
            <button class="btn btn-sm btn-outline-danger">Delete</button>
          </form>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
