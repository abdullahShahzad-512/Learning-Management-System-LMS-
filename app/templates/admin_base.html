{% extends "base.html" %}
{% block content %}
<style>
  .admin-wrapper { display: flex; gap: 1.5rem; min-height: 70vh; }

  .admin-sidebar {
    width: 230px;
    background: linear-gradient(180deg, #4f46e5 0%, #7c3aed 100%);
    color: #fff;
    padding: 1.5rem 1rem;
    border-radius: 16px;
    height: fit-content;
    box-shadow: 0 10px 25px rgba(79,70,229,0.25);
  }
  .admin-sidebar h5 { font-weight: 700; }
  .admin-sidebar a {
    display: block;
    color: #e0e7ff;
    text-decoration: none;
    padding: 0.6rem 0.9rem;
    border-radius: 10px;
    margin-bottom: 0.4rem;
    font-weight: 500;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .admin-sidebar a:hover { background: rgba(255,255,255,0.18); color: #fff; }

  .admin-content { flex: 1; }

  .stat-card {
    border: none;
    border-radius: 18px;
    padding: 1.5rem;
    color: #fff;
    box-shadow: 0 10px 22px rgba(0,0,0,0.12);
  }
  .stat-card p { margin-bottom: 0.25rem; opacity: 0.9; font-weight: 500; }
  .stat-card h3 { font-size: 2.1rem; font-weight: 800; margin: 0; }

  .stat-purple { background: linear-gradient(135deg, #7c3aed, #a855f7); }
  .stat-pink   { background: linear-gradient(135deg, #ec4899, #f43f5e); }
  .stat-orange { background: linear-gradient(135deg, #f97316, #fb923c); }
  .stat-teal   { background: linear-gradient(135deg, #14b8a6, #06b6d4); }

  .admin-table { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
  .admin-table thead th { background: #f3f4f6; border: none; font-weight: 600; }
  .admin-table td { vertical-align: middle; }

  .badge-admin { background: #7c3aed; }
</style>

<div class="admin-wrapper">
  <div class="admin-sidebar">
    <h5 class="mb-4">⚙️ Admin Panel</h5>
    <a href="{{ url_for('main.admin_dashboard') }}">📊 Dashboard</a>
    <a href="{{ url_for('main.admin_users') }}">👥 Users</a>
    <a href="{{ url_for('main.admin_courses') }}">📚 Courses</a>
    <a href="{{ url_for('main.dashboard') }}">← Back to Site</a>
  </div>
  <div class="admin-content">
    {% block admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
